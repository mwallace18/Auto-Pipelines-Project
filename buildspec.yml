version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 449272628177.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Build started
      - mvn clean package -DskipTests
      - docker build -t springboot-app .
      - docker tag springboot-app:latest 449272628177.dkr.ecr.us-east-1.amazonaws.com/springboot-app:latest

  post_build:
    commands:
      - echo Pushing image
      - docker push 449272628177.dkr.ecr.us-east-1.amazonaws.com/springboot-app:latest
